syntax = "proto3";

package rates.v1;

message TableBRecord {
  uint32 term_years = 1;
  uint64 annuity_factor_scaled_1e6 = 2;
  uint64 income_interest_factor_scaled_1e6 = 3;
  uint64 remainder_factor_scaled_1e6 = 4;
}

message TableBFile {
  string schema_id = 1;
  repeated TableBRecord records = 2;
}
