syntax = "proto3";

package rates.v1;

message Section7520RateRecord {
  string effective_month = 1;
  uint32 midterm_afr_120_basis_points = 2;
  uint32 section_7520_rate_basis_points = 3;
}

message Section7520RateFile {
  string schema_id = 1;
  repeated Section7520RateRecord records = 2;
}
