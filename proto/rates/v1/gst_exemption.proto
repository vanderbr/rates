syntax = "proto3";

package rates.v1;

message GstExemptionRecord {
  string period_start_date = 1;
  string period_end_date = 2;
  uint64 exemption_amount_usd = 3;
  string applies_to = 4;
}

message GstExemptionFile {
  string schema_id = 1;
  repeated GstExemptionRecord records = 2;
}
