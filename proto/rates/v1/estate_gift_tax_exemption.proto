syntax = "proto3";

package rates.v1;

message EstateGiftTaxExemptionRecord {
  string period_start_date = 1;
  string period_end_date = 2;
  uint64 basic_exclusion_amount_usd = 3;
  string applies_to = 4;
}

message EstateGiftTaxExemptionFile {
  string schema_id = 1;
  repeated EstateGiftTaxExemptionRecord records = 2;
}
