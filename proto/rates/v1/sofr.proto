syntax = "proto3";

package rates.v1;

message SofrRecord {
  string date = 1;
  optional uint32 rate_basis_points = 2;
  optional int32 percentile_1_basis_points = 3;
  optional int32 percentile_25_basis_points = 4;
  optional int32 percentile_75_basis_points = 5;
  optional int32 percentile_99_basis_points = 6;
  optional uint64 volume_billions = 7;
  optional uint64 average_30_day_basis_points_scaled_1000 = 8;
  optional uint64 average_90_day_basis_points_scaled_1000 = 9;
  optional uint64 average_180_day_basis_points_scaled_1000 = 10;
  optional uint64 sofr_index_scaled_100000000 = 11;
}

message SofrFile {
  string schema_id = 1;
  repeated SofrRecord records = 2;
}
