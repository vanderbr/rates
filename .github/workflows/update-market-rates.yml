# SPDX-License-Identifier: Apache-2.0

name: Update Market Rates

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC-only. Schedule both UTC offsets and gate below on
    # America/New_York so the intended times survive daylight saving changes.
    - cron: "30 13 * * 1-5"
    - cron: "30 14 * * 1-5"
    - cron: "0 0 * * 2-6"
    - cron: "0 1 * * 2-6"

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  market-rates:
    name: Market Rates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check schedule window
        id: schedule_window
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          python - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          should_run = True
          reason = "manual dispatch"
          if os.environ["EVENT_NAME"] == "schedule":
              now = datetime.now(ZoneInfo("America/New_York"))
              schedule = os.environ["EVENT_SCHEDULE"]
              is_weekday = now.weekday() < 5
              is_daylight_time = now.dst() is not None and now.dst().total_seconds() != 0
              active_schedules = {
                  "30 13 * * 1-5",
                  "0 0 * * 2-6",
              } if is_daylight_time else {
                  "30 14 * * 1-5",
                  "0 1 * * 2-6",
              }
              should_run = is_weekday and schedule in active_schedules
              reason = f"{now.strftime('%Y-%m-%d %H:%M %Z')} schedule={schedule}"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"should_run={str(should_run).lower()}\n")
              output.write(f"reason={reason}\n")
          print(f"should_run={should_run} ({reason})")
          PY

      - name: Require automation token
        if: ${{ steps.schedule_window.outputs.should_run == 'true' }}
        env:
          RATES_AUTOMATION_TOKEN: ${{ secrets.RATES_AUTOMATION_TOKEN }}
        run: |
          if [ -z "${RATES_AUTOMATION_TOKEN}" ]; then
            echo "RATES_AUTOMATION_TOKEN must be configured so update PRs trigger validation and auto-merge safely."
            exit 1
          fi

      - name: Checkout
        if: ${{ steps.schedule_window.outputs.should_run == 'true' }}
        uses: actions/checkout@v6

      - name: Set up Python
        if: ${{ steps.schedule_window.outputs.should_run == 'true' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Test market rate updater
        if: ${{ steps.schedule_window.outputs.should_run == 'true' }}
        run: |
          python -m unittest scripts.tests.test_update_market_rates
          python -m unittest scripts.tests.test_repository_layout

      - name: Update market rate JSON
        if: ${{ steps.schedule_window.outputs.should_run == 'true' }}
        run: python scripts/update_market_rates.py --write

      - name: Generate manifests, schemas, and protobuf artifacts
        if: ${{ steps.schedule_window.outputs.should_run == 'true' }}
        run: python scripts/artifact_contract.py

      - name: Test generated market rate data
        if: ${{ steps.schedule_window.outputs.should_run == 'true' }}
        run: |
          python -m unittest scripts.tests.test_update_market_rates
          python -m unittest scripts.tests.test_repository_layout

      - name: Open pull request for market rate updates
        if: ${{ steps.schedule_window.outputs.should_run == 'true' }}
        id: create_pull_request
        env:
          GH_TOKEN: ${{ secrets.RATES_AUTOMATION_TOKEN }}
          BRANCH: automation/market-rate-updates
          TITLE: Update market rates
          COMMIT_MESSAGE: Update market rates
          BODY: |
            Updates market rate data, generated artifacts, and indexes.

            Tests:
            - `python -m unittest scripts.tests.test_update_market_rates`
            - `python -m unittest scripts.tests.test_repository_layout`
            - `python scripts/artifact_contract.py`
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "pull-request-number=" >> "${GITHUB_OUTPUT}"
            echo "pull-request-url=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git config user.name "rates automation"
          git config user.email "actions@users.noreply.github.com"
          git checkout -B "${BRANCH}"
          git add -A
          git commit -m "${COMMIT_MESSAGE}"
          git push --force-with-lease origin "${BRANCH}"

          pr_url="$(gh pr list --head "${BRANCH}" --state open --json url --jq '.[0].url // ""')"
          if [ -n "${pr_url}" ]; then
            gh pr edit "${pr_url}" --title "${TITLE}" --body "${BODY}"
          else
            pr_url="$(gh pr create --base main --head "${BRANCH}" --title "${TITLE}" --body "${BODY}")"
          fi

          echo "pull-request-url=${pr_url}" >> "${GITHUB_OUTPUT}"
          echo "pull-request-number=${pr_url##*/}" >> "${GITHUB_OUTPUT}"

      - name: Merge validated update pull request
        if: ${{ steps.schedule_window.outputs.should_run == 'true' && steps.create_pull_request.outputs.pull-request-number != '' }}
        env:
          GH_TOKEN: ${{ secrets.RATES_AUTOMATION_TOKEN }}
          PULL_REQUEST_URL: ${{ steps.create_pull_request.outputs.pull-request-url }}
        run: gh pr merge --squash --delete-branch "${PULL_REQUEST_URL}"
