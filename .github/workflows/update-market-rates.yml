# SPDX-License-Identifier: Apache-2.0

name: Update Market Rates

on:
  workflow_dispatch:
  schedule:
    # SOFR is normally published at about 8:00 a.m. New York time and EFFR at
    # about 9:00 a.m. GitHub cron is UTC-only; 14:35 UTC is 9:35 a.m. EST
    # and 10:35 a.m. EDT, after both normal publications with update margin.
    - cron: "35 14 * * 1-5"

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  market-rates:
    name: Market Rates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Test market rate updater
        run: |
          python -m unittest scripts.tests.test_update_market_rates
          python -m unittest scripts.tests.test_repository_layout

      - name: Update market rate JSON
        run: python scripts/update_market_rates.py --write

      - name: Generate manifests, schemas, and protobuf artifacts
        run: python scripts/artifact_contract.py

      - name: Test generated market rate data
        run: |
          python -m unittest scripts.tests.test_update_market_rates
          python -m unittest scripts.tests.test_repository_layout

      - name: Open pull request for market rate updates
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automation/market-rate-updates
          delete-branch: true
          title: "Update market rates"
          commit-message: "Update market rates"
          labels: "data, automation"
          body: |
            ## Summary

            Updates daily market rate source data:

            - `treasury/treasury-yield-curve/manifest.json`
            - `treasury/treasury-yield-curve/by-year/YYYY-treasury-yield-curve.json`
            - `fed-funds/manifest.json`
            - `fed-funds/by-year/YYYY-fed-funds.json`
            - `sofr/manifest.json`
            - `sofr/by-year/YYYY-sofr.json`
            - `sofr/sofr-30d-average/manifest.json`
            - `sofr/sofr-30d-average/by-year/YYYY-sofr-30d-average.json`
            - `sofr/sofr-90d-average/manifest.json`
            - `sofr/sofr-90d-average/by-year/YYYY-sofr-90d-average.json`
            - `sofr/sofr-180d-average/manifest.json`
            - `sofr/sofr-180d-average/by-year/YYYY-sofr-180d-average.json`
            - `sofr/sofr-index/manifest.json`
            - `sofr/sofr-index/by-year/YYYY-sofr-index.json`
            - dataset `protobuf/*.pb` files
            - `api/v1/index.json`
            - `api/v1/datasets/*/latest.json`
            - `api/v1/datasets/*/by-date/*.json`
            - `api/v1/datasets/*/by-month/*.json`
            - `index.json`
            - `schemas/v1/*.schema.json`

            ## Sources

            - Cite: https://home.treasury.gov/resource-center/data-chart-center/interest-rates/daily-treasury-rates.csv/{year}/all?field_tdr_date_value={year}&type=daily_treasury_yield_curve&page=&_format=csv
            - Cite: https://markets.newyorkfed.org/api/rates/unsecured/effr/search.csv
            - Cite: https://markets.newyorkfed.org/api/rates/all/search.csv
            - Interpretation: This automation records source-published daily
              percentage rates as integer basis points. Unpublished business
              dates are omitted, not represented by placeholder records.
              Fractional SOFR averages are stored as basis points scaled by
              1000, and the SOFR Index is stored scaled by 100000000.

            ## Tests

            - [x] `python -m unittest scripts.tests.test_update_market_rates` before and after updating
            - [x] `python -m unittest scripts.tests.test_repository_layout` before and after updating
            - [x] `python scripts/artifact_contract.py`
