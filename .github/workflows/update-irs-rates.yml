# SPDX-License-Identifier: Apache-2.0

name: Update IRS Rates

on:
  workflow_dispatch:
  schedule:
    # IRS section 7520 and AFR rates are published monthly, but publication
    # timing can drift. Poll daily after mid-month; unchanged data produces no
    # pull request.
    - cron: "37 11 15-28 * *"

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  irs-rates:
    name: IRS Rates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Require automation token
        env:
          RATES_AUTOMATION_TOKEN: ${{ secrets.RATES_AUTOMATION_TOKEN }}
        run: |
          if [ -z "${RATES_AUTOMATION_TOKEN}" ]; then
            echo "RATES_AUTOMATION_TOKEN must be configured so update PRs trigger validation and auto-merge safely."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install PDF text extractor
        run: sudo apt-get update && sudo apt-get install --yes poppler-utils

      - name: Test IRS rate updaters
        run: make test

      - name: Update section 7520 JSON
        run: python scripts/update_section_7520_rates.py --write

      - name: Update AFR JSON and archive monthly revenue ruling PDFs
        run: python scripts/update_afr_rates.py --write --archive-sources

      - name: Generate manifests, schemas, and protobuf artifacts
        run: python scripts/artifact_contract.py

      - name: Test generated IRS rate data
        run: make test

      - name: Open pull request for IRS rate updates
        id: create_pull_request
        env:
          GH_TOKEN: ${{ secrets.RATES_AUTOMATION_TOKEN }}
          BRANCH: automation/irs-rate-updates
          TITLE: Update IRS rates
          COMMIT_MESSAGE: Update IRS rates
          BODY: |
            Updates IRS monthly rate data, archived revenue rulings, generated artifacts, and indexes.

            Tests:
            - `make test`
            - `python scripts/artifact_contract.py`
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "pull-request-number=" >> "${GITHUB_OUTPUT}"
            echo "pull-request-url=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git config user.name "rates automation"
          git config user.email "actions@users.noreply.github.com"
          git checkout -B "${BRANCH}"
          git add -A
          git commit -m "${COMMIT_MESSAGE}"
          git push --force-with-lease origin "${BRANCH}"

          pr_url="$(gh pr list --head "${BRANCH}" --state open --json url --jq '.[0].url // ""')"
          if [ -n "${pr_url}" ]; then
            gh pr edit "${pr_url}" --title "${TITLE}" --body "${BODY}"
          else
            pr_url="$(gh pr create --base main --head "${BRANCH}" --title "${TITLE}" --body "${BODY}")"
          fi

          echo "pull-request-url=${pr_url}" >> "${GITHUB_OUTPUT}"
          echo "pull-request-number=${pr_url##*/}" >> "${GITHUB_OUTPUT}"

      - name: Merge validated update pull request
        if: ${{ steps.create_pull_request.outputs.pull-request-number != '' }}
        env:
          GH_TOKEN: ${{ secrets.RATES_AUTOMATION_TOKEN }}
          PULL_REQUEST_URL: ${{ steps.create_pull_request.outputs.pull-request-url }}
        run: gh pr merge --squash --delete-branch "${PULL_REQUEST_URL}"
