# SPDX-License-Identifier: Apache-2.0

name: Update IRS Rates

on:
  workflow_dispatch:
  schedule:
    # IRS section 7520 and AFR rates are published monthly, but publication
    # timing can drift. Poll daily after mid-month; unchanged data produces no
    # pull request.
    - cron: "37 11 15-28 * *"

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  irs-rates:
    name: IRS Rates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Require automation token
        env:
          RATES_AUTOMATION_TOKEN: ${{ secrets.RATES_AUTOMATION_TOKEN }}
        run: |
          if [ -z "${RATES_AUTOMATION_TOKEN}" ]; then
            echo "RATES_AUTOMATION_TOKEN must be configured so update PRs trigger validation and auto-merge safely."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install PDF text extractor
        run: sudo apt-get update && sudo apt-get install --yes poppler-utils

      - name: Test IRS rate updaters
        run: make test

      - name: Update section 7520 JSON
        run: python scripts/update_section_7520_rates.py --write

      - name: Update AFR JSON and archive monthly revenue ruling PDFs
        run: python scripts/update_afr_rates.py --write --archive-sources

      - name: Generate manifests, schemas, and protobuf artifacts
        run: python scripts/artifact_contract.py

      - name: Test generated IRS rate data
        run: make test

      - name: Open pull request for IRS rate updates
        id: create_pull_request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.RATES_AUTOMATION_TOKEN }}
          branch: automation/irs-rate-updates
          delete-branch: true
          title: "Update IRS rates"
          commit-message: "Update IRS rates"
          labels: "data, automation"
          body: |
            ## Summary

            Updates IRS rate source data from current published IRS pages:

            - `7520/by-year/YYYY-section-7520-rates.json`
            - `afr/manifest.json`
            - `afr/by-year/YYYY-afr.json`
            - `sources/irs-revenue-rulings/`
            - dataset `protobuf/*.pb` files
            - `index.json`
            - `schemas/v1/*.schema.json`

            ## Statutory / Tax Authority

            - Cite: https://www.irs.gov/businesses/small-businesses-self-employed/section-7520-interest-rates
            - Cite: https://www.irs.gov/applicable-federal-rates
            - Interpretation: This automation records IRS-published monthly
              rates as integer basis points, preserving chronological order.
            - Alternative interpretations considered: None; this is source data
              ingestion, not calculation logic.

            ## Tests

            - [x] `make test` before and after updating generated data
            - [x] `python scripts/artifact_contract.py`

      - name: Enable auto-merge after validation
        if: ${{ steps.create_pull_request.outputs.pull-request-number != '' }}
        env:
          GH_TOKEN: ${{ secrets.RATES_AUTOMATION_TOKEN }}
          PULL_REQUEST_URL: ${{ steps.create_pull_request.outputs.pull-request-url }}
        run: gh pr merge --auto --squash --delete-branch "${PULL_REQUEST_URL}"
