# SPDX-License-Identifier: Apache-2.0

name: Update Annual IRS Rates

on:
  workflow_dispatch:
  schedule:
    # Annual inflation adjustments are usually published late in the year.
    # Running weekly from November through January polls the publication window;
    # schedule-aware updaters no-op after the target year is already present.
    - cron: "19 12 * 11,12,1 2"

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  annual-irs-rates:
    name: Annual IRS Rates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install PDF text extractor
        run: sudo apt-get update && sudo apt-get install --yes poppler-utils

      - name: Test annual IRS rate updaters
        run: |
          python -m unittest scripts.tests.test_update_annual_gift_exclusion
          python -m unittest scripts.tests.test_update_gst_exemption
          python -m unittest scripts.tests.test_update_noncitizen_spouse_gift_exclusion
          python -m unittest scripts.tests.test_update_unified_estate_gift_tax_exemption
          python -m unittest scripts.tests.test_repository_layout

      - name: Update annual gift exclusion JSON
        run: python scripts/update_annual_gift_exclusion.py --write

      - name: Update GST exemption JSON
        run: python scripts/update_gst_exemption.py --write

      - name: Update noncitizen spouse gift exclusion JSON
        run: python scripts/update_noncitizen_spouse_gift_exclusion.py --write

      - name: Update unified estate and gift tax exemption JSON
        run: python scripts/update_unified_estate_gift_tax_exemption.py --write

      - name: Generate manifests, schemas, and protobuf artifacts
        run: python scripts/artifact_contract.py

      - name: Test generated annual IRS rate data
        run: |
          python -m unittest scripts.tests.test_update_annual_gift_exclusion
          python -m unittest scripts.tests.test_update_gst_exemption
          python -m unittest scripts.tests.test_update_noncitizen_spouse_gift_exclusion
          python -m unittest scripts.tests.test_update_unified_estate_gift_tax_exemption
          python -m unittest scripts.tests.test_repository_layout

      - name: Open pull request for annual IRS rate updates
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automation/annual-irs-rate-updates
          delete-branch: true
          title: "Update annual IRS rates"
          commit-message: "Update annual IRS rates"
          labels: "data, automation"
          body: |
            ## Summary

            Updates annual IRS inflation-adjusted source data from current
            published IRS revenue procedures, Form 709 instructions, and
            statutory authority:

            - `annual-gift-exclusion/rates.json`
            - `gst-exemption/rates.json`
            - `noncitizen-spouse-gift-exclusion/rates.json`
            - `estate-gift-tax-exemption/rates.json`
            - dataset `protobuf/*.pb` files
            - `index.json`
            - `schemas/v1/*.schema.json`

            ## Statutory / Tax Authority

            - Cite: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title26-section2503&num=0&edition=prelim
            - Cite: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title26-section2523&num=0&edition=prelim
            - Cite: https://www.irs.gov/instructions/i709
            - Cite: https://www.irs.gov/newsroom/irs-releases-tax-inflation-adjustments-for-tax-year-2026-including-amendments-from-the-one-big-beautiful-bill
            - Interpretation: This automation records IRS-published annual
              exclusion amounts as integer U.S. dollars, preserving
              chronological order. Schedule-aware updaters defer outside the
              November-through-January publication window or after the target
              year has already been recorded.
            - Alternative interpretations considered: None; this is source
              data ingestion, not calculation logic.

            ## Tests

            - [x] `python -m unittest scripts.tests.test_update_annual_gift_exclusion` before and after updating
            - [x] `python -m unittest scripts.tests.test_update_gst_exemption` before and after updating
            - [x] `python -m unittest scripts.tests.test_update_noncitizen_spouse_gift_exclusion` before and after updating
            - [x] `python -m unittest scripts.tests.test_update_unified_estate_gift_tax_exemption` before and after updating
            - [x] `python -m unittest scripts.tests.test_repository_layout` before and after updating
            - [x] `python scripts/artifact_contract.py`
