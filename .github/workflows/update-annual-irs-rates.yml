# SPDX-License-Identifier: Apache-2.0

name: Update Annual IRS Rates

on:
  workflow_dispatch:
  schedule:
    # Poll from November through January; missing/unreleased source pages no-op.
    # Schedule-aware updaters no-op after the target year is already present.
    - cron: "19 12 * 11,12,1 2"

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  annual-irs-rates:
    name: Annual IRS Rates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Require automation token
        env:
          RATES_AUTOMATION_TOKEN: ${{ secrets.RATES_AUTOMATION_TOKEN }}
        run: |
          if [ -z "${RATES_AUTOMATION_TOKEN}" ]; then
            echo "RATES_AUTOMATION_TOKEN must be configured so update PRs trigger validation and auto-merge safely."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install PDF text extractor
        run: sudo apt-get update && sudo apt-get install --yes poppler-utils

      - name: Test annual IRS rate updaters
        run: |
          python -m unittest scripts.tests.test_update_annual_gift_exclusion
          python -m unittest scripts.tests.test_update_gst_exemption
          python -m unittest scripts.tests.test_update_noncitizen_spouse_gift_exclusion
          python -m unittest scripts.tests.test_update_unified_estate_gift_tax_exemption
          python -m unittest scripts.tests.test_repository_layout

      - name: Update annual gift exclusion JSON
        run: python scripts/update_annual_gift_exclusion.py --write

      - name: Update GST exemption JSON
        run: python scripts/update_gst_exemption.py --write

      - name: Update noncitizen spouse gift exclusion JSON
        run: python scripts/update_noncitizen_spouse_gift_exclusion.py --write

      - name: Update unified estate and gift tax exemption JSON
        run: python scripts/update_unified_estate_gift_tax_exemption.py --write

      - name: Generate manifests, schemas, and protobuf artifacts
        run: python scripts/artifact_contract.py

      - name: Test generated annual IRS rate data
        run: |
          python -m unittest scripts.tests.test_update_annual_gift_exclusion
          python -m unittest scripts.tests.test_update_gst_exemption
          python -m unittest scripts.tests.test_update_noncitizen_spouse_gift_exclusion
          python -m unittest scripts.tests.test_update_unified_estate_gift_tax_exemption
          python -m unittest scripts.tests.test_repository_layout

      - name: Open pull request for annual IRS rate updates
        id: create_pull_request
        env:
          GH_TOKEN: ${{ secrets.RATES_AUTOMATION_TOKEN }}
          BRANCH: automation/annual-irs-rate-updates
          TITLE: Update annual IRS rates
          COMMIT_MESSAGE: Update annual IRS rates
          BODY: |
            Updates annual IRS rate data, generated artifacts, and indexes.

            Tests:
            - `python -m unittest scripts.tests.test_update_annual_gift_exclusion`
            - `python -m unittest scripts.tests.test_update_gst_exemption`
            - `python -m unittest scripts.tests.test_update_noncitizen_spouse_gift_exclusion`
            - `python -m unittest scripts.tests.test_update_unified_estate_gift_tax_exemption`
            - `python -m unittest scripts.tests.test_repository_layout`
            - `python scripts/artifact_contract.py`
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "pull-request-number=" >> "${GITHUB_OUTPUT}"
            echo "pull-request-url=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git config user.name "rates automation"
          git config user.email "actions@users.noreply.github.com"
          git checkout -B "${BRANCH}"
          git add -A
          git commit -m "${COMMIT_MESSAGE}"
          git push --force-with-lease origin "${BRANCH}"

          pr_url="$(gh pr list --head "${BRANCH}" --state open --json url --jq '.[0].url // ""')"
          if [ -n "${pr_url}" ]; then
            gh pr edit "${pr_url}" --title "${TITLE}" --body "${BODY}"
          else
            pr_url="$(gh pr create --base main --head "${BRANCH}" --title "${TITLE}" --body "${BODY}")"
          fi

          echo "pull-request-url=${pr_url}" >> "${GITHUB_OUTPUT}"
          echo "pull-request-number=${pr_url##*/}" >> "${GITHUB_OUTPUT}"

      - name: Merge validated update pull request
        if: ${{ steps.create_pull_request.outputs.pull-request-number != '' }}
        env:
          GH_TOKEN: ${{ secrets.RATES_AUTOMATION_TOKEN }}
          PULL_REQUEST_URL: ${{ steps.create_pull_request.outputs.pull-request-url }}
        run: gh pr merge --squash --delete-branch "${PULL_REQUEST_URL}"
